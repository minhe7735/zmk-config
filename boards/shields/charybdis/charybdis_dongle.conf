# Keep BLE disabled for USB-only dongle with ESB
CONFIG_ZMK_BLE=n

# Disable default split transports
CONFIG_ZMK_SPLIT_BLE=n

# Disable wired split
CONFIG_ZMK_SPLIT_WIRED=n

# Enable ESB split transport
CONFIG_ZMK_SPLIT_ESB=y

# ESB protocol settings
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y

# MPSL timeslot (1 for BLE disabled)
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1

# ESB stack requirements
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=64
CONFIG_ESB_TX_FIFO_SIZE=1

# ESB buffer
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=32
CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=32

# Pointing & input
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_INPUT_PROCESSOR_REPORT_RATE_LIMIT_DEFAULT=4

# No sleep for dongle
CONFIG_ZMK_SLEEP=n

# Battery reporting (peripheral count for ESB)
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_MAX_PAIRED=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Prospector
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n

# Default layout
# CONFIG_PROSPECTOR_STATUS_SCREEN_DEFAULT=y
# OR Rounded Grid layout
# CONFIG_PROSPECTOR_STATUS_SCREEN_ROUNDED_GRID=y
# OR Wind Map layout
CONFIG_PROSPECTOR_STATUS_SCREEN_WIND_MAP=y
# OR Operator layout (HUD style with WPM graph)
# CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
#
# Show/Hide modifiers entirely
CONFIG_PROSPECTOR_SHOW_MODIFIERS=y
# Dim inactive modifiers instead of hiding them
CONFIG_PROSPECTOR_SHOW_INACTIVE_MODIFIERS=y
# Set the order (G=GUI, A=Alt, C=Ctrl, S=Shift)
# Default is "GACS"
CONFIG_PROSPECTOR_MODIFIER_ORDER="GASC"
# Choose Symbol Style
# Mac (Symbols: ⌘ ⌥ ⌃ ⇧)
CONFIG_PROSPECTOR_MODIFIER_OS_MAC=y
# Windows (Text: WIN ALT CTRL SHFT)
# CONFIG_PROSPECTOR_MODIFIER_OS_WINDOWS=y
# Generic (Text: GUI ALT CTRL SHFT)
# CONFIG_PROSPECTOR_MODIFIER_OS_GENERIC=y
