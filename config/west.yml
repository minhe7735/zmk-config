    - name: zmk-pmw3610-driver
      remote: efogdev
      revision: zephyr-4.1
    - name: zmk-input-processor-xyz
      remote: badjeff
      revision: main
    - name: zmk-report-rate-limit
      remote: efogdev
      revision: main
    - name: prospector-zmk-module
      remote: minhe7735
      revision: core/zephyr-4-1
    - name: text-expander
      remote: minhe7735
      revision: dev
  self:
